spring.application.name=bharatyatra
 
# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
server.port=8080


# \u2500\u2500\u2500 MYSQL DATABASE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# \u2500\u2500\u2500 JPA / HIBERNATE \u2500\u2500\
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# \u2500\u2500\u2500 JWT \u2500\u2500\u2500\u2500
app.jwt.secret=ExploreIndiaSecretKey2024VeryLongSecretKeyForHS256Algorithm
app.jwt.expiration-ms=86400000


# \u2500\u2500\u2500 FILE UPLOAD \u2500\u2500\u2500\u2500
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB


# Local upload directory (change to S3 config for production)
app.upload.dir=uploads/
app.upload.base-url=http://localhost:8080/files/
spring.jpa.hibernate.ddl-auto=update

