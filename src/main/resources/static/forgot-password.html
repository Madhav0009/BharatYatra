<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - Bharat Yatra</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="forgot">

<main>
  <section>
    <div class="container auth-layout">

      <div class="auth-intro">
        <div class="eyebrow">Recover account</div>
        <h1>Forgot Password?</h1>
        <p>Enter your registered email. We will send you an OTP.</p>
      </div>

      <form class="card auth-card form-grid" id="forgotForm">

        <h2>Forgot Password</h2>

        <div class="field">
          <label>Email</label>
          <input id="forgotEmail" type="email" required placeholder="Enter your email">
        </div>

        <button class="primary-button" type="submit">
          Send OTP
        </button>

        <a class="ghost-button" href="login.html">
          Back to Login
        </a>

      </form>

    </div>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
  BY.initForgotPasswordPage();
</script>

</body>
</html>
