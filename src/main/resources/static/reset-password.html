<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - Bharat Yatra</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="reset-password">

<main>
  <section>
    <div class="container auth-layout">

      <div class="auth-intro">
        <div class="eyebrow">Create new password</div>
        <h1>Reset Password</h1>
        <p>Set a new password for your account.</p>
      </div>

      <form class="card auth-card form-grid" id="resetForm">

        <h2>New Password</h2>

        <div class="field">
          <label>New Password</label>
          <input id="newPassword" type="password" required placeholder="Enter new password">
        </div>

        <button class="primary-button" type="submit">
          Reset Password
        </button>

        <a class="ghost-button" href="login.html">
          Back to Login
        </a>

      </form>

    </div>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
  BY.initResetPasswordPage();
</script>

</body>
</html>
