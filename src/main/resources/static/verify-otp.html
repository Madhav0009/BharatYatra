<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify OTP - Bharat Yatra</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="verify-otp">

<main>
  <section>
    <div class="container auth-layout">

      <div class="auth-intro">
        <div class="eyebrow">Security check</div>
        <h1>Verify OTP</h1>
        <p>Enter the OTP sent to your email.</p>
      </div>

      <form class="card auth-card form-grid" id="otpForm">

        <h2>OTP Verification</h2>

        <div class="field">
          <label>OTP</label>
          <input id="otp" type="text" required placeholder="Enter OTP">
        </div>

        <button class="primary-button" type="submit">
          Verify OTP
        </button>

        <a class="ghost-button" href="forgot-password.html">
          Back / Resend OTP
        </a>

      </form>

    </div>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    BY.initVerifyOtpPage();
  });
</script>

</body>
</html>
